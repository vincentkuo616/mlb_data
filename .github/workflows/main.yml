name: Update MLB Data

on:
  schedule:
    - cron: '18 10 * * *' # 每天自動執行
  workflow_dispatch: # 也可以手動點擊執行

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write # 賦予寫入檔案回 Repo 的權限
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
        with:
          fetch-depth: 0 

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          # 加上 openpyxl 以支援 Excel 輸出
          pip install pandas MLB-StatsAPI nba_api openpyxl numpy

      - name: Run MLB Scripts
        continue-on-error: true  
        run: |
          # 這裡假設你的檔名是 MLB_API_GoogleSheet.py
          # 如果還有 NBA 的腳本，也可以加在下面一行執行
          python MLB_API_GoogleSheet.py

      - name: Commit and push if changed
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          
          # 1. 使用 git add . 直接追蹤目錄下所有變動（包含新產生的 xlsx, txt, csv）
          git add .
          
          # 2. 檢查 status 是否有變動 (包含 Untracked files)
          if [ -n "$(git status --porcelain)" ]; then
            echo "檢測到檔案變動，準備提交..."
            git commit -m "Auto update Sports data: $(date +'%Y-%m-%d')"
            git push
          else
            echo "沒有任何檔案變動，跳過提交。"
          fi
