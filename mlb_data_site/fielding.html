<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2026 MLB 防守數據查詢</title>
    <!-- DataTables 核心 CSS -->
    <link rel="stylesheet" href="https://cdn.datatables.net/1.13.6/css/jquery.dataTables.min.css">
    <!-- 🛠️ 核心引入：FixedColumns, ColReorder, Buttons(ColVis) 專用外掛 CSS -->
    <link rel="stylesheet" href="https://cdn.datatables.net/fixedcolumns/4.3.0/css/fixedColumns.dataTables.min.css">
    <link rel="stylesheet" href="https://cdn.datatables.net/colreorder/1.7.0/css/colReorder.dataTables.min.css">
    <link rel="stylesheet" href="https://cdn.datatables.net/buttons/2.4.2/css/buttons.dataTables.min.css">
    
    <style>
        body { font-family: sans-serif; margin: 20px; background-color: #f4f4f9; }
        h2 { color: #008033; } /* MLB Green for Fielding */
        .container { background: white; padding: 20px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        
        /* 導覽列樣式 */
        .nav-menu { margin-bottom: 20px; background: #003263; padding: 10px; border-radius: 5px; }
        .nav-menu a { color: white; text-decoration: none; padding: 10px 15px; margin-right: 5px; display: inline-block; }
        .nav-menu a:hover { background: #0056b3; border-radius: 4px; }
        .nav-menu a.active { background: #ffcc00; color: #003263; font-weight: bold; border-radius: 4px; }

        /* 彈性佈局篩選區塊 */
        .filter-section { margin-bottom: 20px; display: flex; gap: 15px; flex-wrap: wrap; align-items: center; background: #f2fdf5; padding: 15px; border-radius: 5px; border-left: 5px solid #008033; }
        .filter-item { display: flex; align-items: center; gap: 5px; }
        select, input[type="number"] { padding: 6px; border-radius: 4px; border: 1px solid #ccc; background: white; }
        select { min-width: 130px; }
        
        /* 數值過濾專用區塊樣式 */
        .num-filter-block { display: flex; align-items: center; gap: 8px; border-left: 2px solid #ccc; padding-left: 15px; }

        /* 🛠️ 資深架構師防禦性 CSS */
        #fieldingTable th, #fieldingTable td { background-color: #ffffff; }
        #tableHeader th { background-color: #f8f9fa !important; cursor: move; }
        .dt-buttons { margin-bottom: 15px; }
        /* 對齊防守綠色主題 */
        .dt-button.colvis-btn { background: #008033 !important; color: white !important; border-radius: 4px !important; padding: 6px 12px !important; border: none !important; font-weight: bold; }
        .dt-button.colvis-btn:hover { background: #005a24 !important; }
    </style>
</head>
<body>

<div class="container">
    <nav class="nav-menu">
        <a href="hitting.html">打擊數據 (Hitting)</a>
        <a href="pitching.html">投手數據 (Pitching)</a>
        <a href="fielding.html" class="active">防守數據 (Fielding)</a>
    </nav>

    <h2>🛡️ 2026 MLB 防守數據即時查詢</h2>
    
    <div class="filter-section">
        <div class="filter-item">
            <label>球隊: </label>
            <select id="teamFilter"><option value="">全部球隊</option></select>
        </div>
        <div class="filter-item">
            <label>位置: </label>
            <select id="posFilter"><option value="">全部位置</option></select>
        </div>
        <div class="filter-item">
            <label>球員: </label>
            <select id="nameFilter"><option value="">全部球員</option></select>
        </div>
        
        <!-- 🛠️ 新增需求 2：防守數據數值動態過濾器 UI 面板 -->
        <div class="num-filter-block">
            <label style="font-weight: bold; color: #008033;">📊 進階數值篩選: </label>
            <select id="numFilterTarget"><option value="">選擇評分欄位</option></select>
            <select id="numFilterCond" style="min-width: 70px;">
                <option value="">條件</option>
                <option value="gt">&gt;</option>
                <option value="gte">&gt;=</option>
                <option value="lt">&lt;</option>
                <option value="lte">&lt;=</option>
                <option value="eq">=</option>
            </select>
            <input type="number" id="numFilterVal" step="any" placeholder="輸入數值" style="width: 90px;">
        </div>
    </div>

    <hr>
    <table id="fieldingTable" class="display stripe cell-border" style="width:100%">
        <thead>
            <tr id="tableHeader"></tr>
        </thead>
        <tbody id="tableBody"></tbody>
    </table>
</div>

<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script src="https://cdn.datatables.net/1.13.6/js/jquery.dataTables.min.js"></script>
<!-- 🛠️ 核心引入：FixedColumns, ColReorder, Buttons(ColVis) JS 驅動套件 -->
<script src="https://cdn.datatables.net/fixedcolumns/4.3.0/js/dataTables.fixedColumns.min.js"></script>
<script src="https://cdn.datatables.net/colreorder/1.7.0/js/dataTables.colReorder.min.js"></script>
<script src="https://cdn.datatables.net/buttons/2.4.2/js/dataTables.buttons.min.js"></script>
<script src="https://cdn.datatables.net/buttons/2.4.2/js/buttons.colVis.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>

<script>
    // 防守資料來源
    const csvUrl = 'https://raw.githubusercontent.com/vincentkuo616/mlb_data/main/mlbField_2026.csv';
    let allData = [];
    let table;

    // 🛠️ 新增需求 2：全域防守數據數值邊界攔截核心演算法 (抗扭曲安全寻址版)
    $.fn.dataTable.ext.search.push(function(settings, data, dataIndex) {
        const targetColName = $('#numFilterTarget').val();
        const condition = $('#numFilterCond').val();
        const filterVal = parseFloat($('#numFilterVal').val());

        if (!targetColName || !condition || isNaN(filterVal)) return true;

        // 🛡️ 抗換位防禦：透過唯一的 Name 標記動態反射取得目前實際 Index
        const colIdx = table.column(targetColName + ':name').index();
        if (colIdx === undefined) return true;

        const cellVal = parseFloat(data[colIdx]);
        if (isNaN(cellVal)) return false; 

        switch (condition) {
            case 'gt':  return cellVal > filterVal;
            case 'gte': return cellVal >= filterVal;
            case 'lt':  return cellVal < filterVal;
            case 'lte': return cellVal <= filterVal;
            case 'eq':  return cellVal === filterVal;
            default:    return true;
        }
    });

    $(document).ready(function() {
        Papa.parse(csvUrl, {
            download: true,
            header: true,
            skipEmptyLines: true,
            complete: function(results) {
                allData = results.data;
                const columns = Object.keys(allData[0]);

                // 1. 生成表頭
                let headerHtml = '';
                columns.forEach(col => headerHtml += `<th>${col}</th>`);
                $('#tableHeader').html(headerHtml);

                // 數據注入：動態初始化「進階數值篩選」選單 (安全排除非數值文字型欄位)
                columns.forEach(col => {
                    if (col !== 'team' && col !== 'name' && col !== 'abb' && col.trim() !== '') {
                        $('#numFilterTarget').append(`<option value="${col}">${col}</option>`);
                    }
                });

                // 2. 初始化 DataTable
                table = $('#fieldingTable').DataTable({
                    data: allData,
                    // 🛡️ 防禦關鍵：將 data 與唯一的 name 欄位標記進行綁定
                    columns: columns.map(col => ({ data: col, name: col })),
                    scrollX: true, 
                    pageLength: 10,
                    
                    // 🛠️ 新增需求 1 配置：開啟顯示隱藏、欄位拖拉、與左側固定 4 欄
                    dom: 'Blfrtip', 
                    buttons: [
                        {
                            extend: 'colvis',
                            text: '👁️ 隱藏 / 顯示特定欄位',
                            className: 'colvis-btn'
                        }
                    ],
                    colReorder: true, 
                    fixedColumns: {
                        left: 4
                    },
                    stateSave: true, 
                    language: { search: "關鍵字搜尋：" }
                });

                // 3. 初始化下拉選單內容
                const teams = [...new Set(allData.map(item => item.team))].sort();
                const positions = [...new Set(allData.map(item => item.abb))].sort(); 

                teams.forEach(t => t && $('#teamFilter').append(`<option value="${t}">${t}</option>`));
                positions.forEach(p => p && $('#posFilter').append(`<option value="${p}">${p}</option>`));
                
                // 初始填入所有球員
                updateNameOptions();

                // 4. 連動篩選邏輯 (改用安全字串名稱定址模式，破除 Index 偏移)
                $('#teamFilter, #posFilter').on('change', function() {
                    const team = $('#teamFilter').val();
                    const pos = $('#posFilter').val();

                    table.column('team:name').search(team).column('abb:name').search(pos).draw();
                    
                    updateNameOptions(team, pos);
                });

                $('#nameFilter').on('change', function() {
                    table.column('name:name').search($(this).val()).draw();
                });

                // 🛠️ 新增需求 2 監聽：當進階數值篩選面板條件異動時，即時驅動重繪
                $('#numFilterTarget, #numFilterCond, #numFilterVal').on('input change', function() {
                    table.draw();
                });
            }
        });

        function updateNameOptions(team, pos) {
            const $nameSelect = $('#nameFilter');
            $nameSelect.html('<option value="">全部球員</option>');

            let filtered = allData;
            if (team) filtered = filtered.filter(d => d.team === team);
            if (pos) filtered = filtered.filter(d => d.abb === pos);

            const names = [...new Set(filtered.map(item => item.name))].sort();
            names.forEach(n => n && $nameSelect.append(`<option value="${n}">${n}</option>`));
        }
    });
</script>

</body>
</html>
