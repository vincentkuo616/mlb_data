<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2026 MLB 打者數據查詢</title>
    <link rel="stylesheet" href="https://cdn.datatables.net/1.13.6/css/jquery.dataTables.min.css">
    <link rel="stylesheet" href="https://cdn.datatables.net/fixedcolumns/4.3.0/css/fixedColumns.dataTables.min.css">
    
    <style>
        body { font-family: sans-serif; margin: 20px; background-color: #f4f4f9; }
        h2 { color: #003263; }
        .container { background: white; padding: 20px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .filter-section { margin-bottom: 20px; display: flex; gap: 15px; align-items: center; background: #eef2f7; padding: 15px; border-radius: 5px; }
        select { padding: 5px; border-radius: 4px; border: 1px solid #ccc; min-width: 150px; }
        
        /* 導覽列樣式 */
        .nav-menu { margin-bottom: 20px; background: #003263; padding: 10px; border-radius: 5px; }
        .nav-menu a { color: white; text-decoration: none; padding: 10px 15px; margin-right: 5px; display: inline-block; }
        .nav-menu a:hover { background: #0056b3; border-radius: 4px; }
        .nav-menu a.active { background: #ffcc00; color: #003263; font-weight: bold; border-radius: 4px; }

        /* 🛠️ 核心優化：資深架構師防禦性 CSS */
        /* 確保凍結欄位擁有不透明的背景色，防止水平捲動時後方數字穿透、重疊文字 */
        #mlbTable th,
        #mlbTable td {
            background-color: #ffffff; 
        }
        /* 確保表頭凍結欄位維持乾淨的淺灰色背景 */
        #tableHeader th {
            background-color: #f8f9fa !important;
        }
    </style>
</head>
<body>

<div class="container">
    <nav class="nav-menu">
        <a href="hitting.html" class="active">打擊數據 (Hitting)</a>
        <a href="pitching.html">投手數據 (Pitching)</a>
        <a href="fielding.html">防守數據 (Fielding)</a>
    </nav>
    
    <h2>⚾ 2026 MLB 打者數據即時查詢</h2>
    
    <div class="filter-section">
        <div>
            <label>球隊 (Team): </label>
            <select id="teamFilter">
                <option value="">全部球隊</option>
            </select>
        </div>
        <div>
            <label>球員 (Name): </label>
            <select id="nameFilter">
                <option value="">全部球員</option>
            </select>
        </div>
    </div>

    <hr>
    <table id="mlbTable" class="display stripe cell-border" style="width:100%">
        <thead>
            <tr id="tableHeader"></tr>
        </thead>
        <tbody id="tableBody"></tbody>
    </table>
</div>

<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script src="https://cdn.datatables.net/1.13.6/js/jquery.dataTables.min.js"></script>
<script src="https://cdn.datatables.net/fixedcolumns/4.3.0/js/dataTables.fixedColumns.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>

<script>
    const csvUrl = 'https://raw.githubusercontent.com/vincentkuo616/mlb_data/main/mlbHit_2026.csv';
    let allData = []; // 儲存原始資料
    let table; // DataTables 實例

    $(document).ready(function() {
        Papa.parse(csvUrl, {
            download: true,
            header: true,
            skipEmptyLines: true,
            complete: function(results) {
                allData = results.data;
                const columns = Object.keys(allData[0]);

                // 1. 生成表頭
                let headerHtml = '';
                columns.forEach(col => headerHtml += `<th>${col}</th>`);
                $('#tableHeader').html(headerHtml);

                // 2. 初始化 DataTable
                table = $('#mlbTable').DataTable({
                    data: allData,
                    columns: columns.map(col => ({ data: col })),
                    scrollX: true, // 啟用水平滾動（凍結窗格的前提條件）
                    pageLength: 10,
                    
                    // 🛠️ 核心配置：啟動欄位固定機制，鎖定左側 4 個欄位
                    fixedColumns: {
                        left: 4
                    },
                    
                    language: { search: "關鍵字搜尋：" }
                });

                // 3. 初始化「球隊」下拉選單
                const teams = [...new Set(allData.map(item => item.team))].sort();
                teams.forEach(team => {
                    if(team) $('#teamFilter').append(`<option value="${team}">${team}</option>`);
                });

                // 4. 當「球隊」變動時
                $('#teamFilter').on('change', function() {
                    const selectedTeam = $(this).val();
                    // 更新 DataTable 過濾 (球隊在第 3 欄，index 為 2)
                    table.column(2).search(selectedTeam).draw();
                    // 連動更新「球員」下拉選單
                    updateNameOptions(selectedTeam);
                });

                // 5. 當「球員」變動時
                $('#nameFilter').on('change', function() {
                    const selectedName = $(this).val();
                    // 球員名稱在第 4 欄，index 為 3
                    table.column(3).search(selectedName).draw();
                });
            }
        });

        // 動態更新球員選單的函數
        function updateNameOptions(team) {
            const $nameSelect = $('#nameFilter');
            $nameSelect.html('<option value="">全部球員</option>'); // 重置

            const filteredPlayers = team 
                ? allData.filter(d => d.team === team)
                : allData;

            const names = [...new Set(filteredPlayers.map(item => item.name))].sort();
            
            names.forEach(name => {
                if(name) $nameSelect.append(`<option value="${name}">${name}</option>`);
            });
        }
    });
</script>

</body>
</html>
