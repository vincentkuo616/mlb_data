<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2026 MLB 打者數據查詢</title>
    <!-- DataTables 核心 CSS -->
    <link rel="stylesheet" href="https://cdn.datatables.net/1.13.6/css/jquery.dataTables.min.css">
    <!-- 🛠️ 核心引入：FixedColumns, ColReorder, Buttons(ColVis) 專用外掛 CSS -->
    <link rel="stylesheet" href="https://cdn.datatables.net/fixedcolumns/4.3.0/css/fixedColumns.dataTables.min.css">
    <link rel="stylesheet" href="https://cdn.datatables.net/colreorder/1.7.0/css/colReorder.dataTables.min.css">
    <link rel="stylesheet" href="https://cdn.datatables.net/buttons/2.4.2/css/buttons.dataTables.min.css">
    
    <style>
        body { font-family: sans-serif; margin: 20px; background-color: #f4f4f9; }
        h2 { color: #003263; }
        .container { background: white; padding: 20px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        
        /* 彈性佈局篩選區塊 */
        .filter-section { margin-bottom: 20px; display: flex; gap: 15px; flex-wrap: wrap; align-items: center; background: #eef2f7; padding: 15px; border-radius: 5px; }
        .filter-item { display: flex; align-items: center; gap: 5px; }
        select, input[type="number"] { padding: 6px; border-radius: 4px; border: 1px solid #ccc; background: white; }
        select { min-width: 140px; }
        
        /* 數值過濾專用區塊樣式 */
        .num-filter-block { display: flex; align-items: center; gap: 8px; border-left: 2px solid #ccc; padding-left: 15px; }

        /* 導覽列樣式 */
        .nav-menu { margin-bottom: 20px; background: #003263; padding: 10px; border-radius: 5px; }
        .nav-menu a { color: white; text-decoration: none; padding: 10px 15px; margin-right: 5px; display: inline-block; }
        .nav-menu a:hover { background: #0056b3; border-radius: 4px; }
        .nav-menu a.active { background: #ffcc00; color: #003263; font-weight: bold; border-radius: 4px; }

        /* 🛠️ 資深架構師防禦性 CSS：防止水平捲動文字穿透與按鈕美化 */
        #mlbTable th, #mlbTable td { background-color: #ffffff; }
        #tableHeader th { background-color: #f8f9fa !important; cursor: move; }
        .dt-buttons { margin-bottom: 15px; }
        .dt-button.colvis-btn { background: #003263 !important; color: white !important; border-radius: 4px !important; padding: 6px 12px !important; border: none !important; font-weight: bold; }
        .dt-button.colvis-btn:hover { background: #0056b3 !important; }
    </style>
</head>
<body>

<div class="container">
    <nav class="nav-menu">
        <a href="hitting.html" class="active">打擊數據 (Hitting)</a>
        <a href="pitching.html">投手數據 (Pitching)</a>
        <a href="fielding.html">防守數據 (Fielding)</a>
    </nav>
    
    <h2>⚾ 2026 MLB 打者數據即時查詢</h2>
    
    <div class="filter-section">
        <div class="filter-item">
            <label>球隊 (Team): </label>
            <select id="teamFilter"><option value="">全部球隊</option></select>
        </div>
        <div class="filter-item">
            <label>球員 (Name): </label>
            <select id="nameFilter"><option value="">全部球員</option></select>
        </div>
        
        <!-- 🛠️ 新增需求 2：數值動態過濾器 UI 面板 -->
        <div class="num-filter-block">
            <label style="font-weight: bold; color: #003263;">📊 進階數值篩選: </label>
            <select id="numFilterTarget"><option value="">選擇評分欄位</option></select>
            <select id="numFilterCond" style="min-width: 70px;">
                <option value="">條件</option>
                <option value="gt">&gt;</option>
                <option value="gte">&gt;=</option>
                <option value="lt">&lt;</option>
                <option value="lte">&lt;=</option>
                <option value="eq">=</option>
            </select>
            <input type="number" id="numFilterVal" step="any" placeholder="輸入數值" style="width: 90px;">
        </div>
    </div>

    <hr>
    <table id="mlbTable" class="display stripe cell-border" style="width:100%">
        <thead>
            <tr id="tableHeader"></tr>
        </thead>
        <tbody id="tableBody"></tbody>
    </table>
</div>

<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script src="https://cdn.datatables.net/1.13.6/js/jquery.dataTables.min.js"></script>
<!-- 🛠️ 核心引入：FixedColumns, ColReorder, Buttons(ColVis) JS 驅動套件 -->
<script src="https://cdn.datatables.net/fixedcolumns/4.3.0/js/dataTables.fixedColumns.min.js"></script>
<script src="https://cdn.datatables.net/colreorder/1.7.0/js/dataTables.colReorder.min.js"></script>
<script src="https://cdn.datatables.net/buttons/2.4.2/js/dataTables.buttons.min.js"></script>
<script src="https://cdn.datatables.net/buttons/2.4.2/js/buttons.colVis.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>

<script>
    const csvUrl = 'https://raw.githubusercontent.com/vincentkuo616/mlb_data/main/mlbHit_2026.csv';
    let allData = []; 
    let table; 

    // 🛠️ 新增需求 2：全域數值邊界攔截核心演算法
    $.fn.dataTable.ext.search.push(function(settings, data, dataIndex) {
        const targetColName = $('#numFilterTarget').val();
        const condition = $('#numFilterCond').val();
        const filterVal = parseFloat($('#numFilterVal').val());

        // 如果沒有啟動數值篩選，直接放行
        if (!targetColName || !condition || isNaN(filterVal)) return true;

        // 🛡️ 抗換位防禦：透過 Name 反射取得當前的實際欄位 Index，免除 ColReorder 造成的索引偏移
        const colIdx = table.column(targetColName + ':name').index();
        if (colIdx === undefined) return true;

        // 取得該列當前儲存格的數值
        const cellVal = parseFloat(data[colIdx]);
        if (isNaN(cellVal)) return false; 

        // 進行條件判定
        switch (condition) {
            case 'gt':  return cellVal > filterVal;
            case 'gte': return cellVal >= filterVal;
            case 'lt':  return cellVal < filterVal;
            case 'lte': return cellVal <= filterVal;
            case 'eq':  return cellVal === filterVal;
            default:    return true;
        }
    });

    $(document).ready(function() {
        Papa.parse(csvUrl, {
            download: true,
            header: true,
            skipEmptyLines: true,
            complete: function(results) {
                allData = results.data;
                const columns = Object.keys(allData[0]);

                // 1. 生成表頭
                let headerHtml = '';
                columns.forEach(col => headerHtml += `<th>${col}</th>`);
                $('#tableHeader').html(headerHtml);

                // 🛠️ 數據注入：動態初始化「進階數值篩選」的選單欄位 (排除非數值文字型欄位)
                columns.forEach(col => {
                    if (col !== 'team' && col !== 'name' && col.trim() !== '') {
                        $('#numFilterTarget').append(`<option value="${col}">${col}</option>`);
                    }
                });

                // 2. 初始化 DataTable
                table = $('#mlbTable').DataTable({
                    data: allData,
                    // 🛡️ 防禦關鍵：對齊 Data 與 Name，提供動態尋址基礎
                    columns: columns.map(col => ({ data: col, name: col })),
                    scrollX: true, 
                    pageLength: 10,
                    
                    // 🛠️ 新增需求 1 配置：啟用顯示隱藏按鈕、欄位拖拉、與左側固定 4 欄
                    dom: 'Blfrtip', // 納入 Buttons 節點
                    buttons: [
                        {
                            extend: 'colvis',
                            text: '👁️ 隱藏 / 顯示特定欄位',
                            className: 'colvis-btn'
                        }
                    ],
                    colReorder: true, // 允許滑鼠拖拉表頭更換順序
                    fixedColumns: {
                        left: 4
                    },
                    stateSave: true, // 記憶使用者的欄位調整狀態
                    language: { search: "關鍵字搜尋：" }
                });

                // 3. 初始化「球隊」下拉選單
                const teams = [...new Set(allData.map(item => item.team))].sort();
                teams.forEach(team => {
                    if(team) $('#teamFilter').append(`<option value="${team}">${team}</option>`);
                });

                // 4. 當「球隊」變動時
                $('#teamFilter').on('change', function() {
                    const selectedTeam = $(this).val();
                    table.column('team:name').search(selectedTeam).draw(); // 改用 Name 定址
                    updateNameOptions(selectedTeam);
                });

                // 5. 當「球員」變動時
                $('#nameFilter').on('change', function() {
                    const selectedName = $(this).val();
                    table.column('name:name').search(selectedName).draw(); // 改用 Name 定址
                });

                // 🛠️ 新增需求 2：數值篩選變動時，重新驅動資料重繪
                $('#numFilterTarget, #numFilterCond, #numFilterVal').on('input change', function() {
                    table.draw();
                });
            }
        });

        function updateNameOptions(team) {
            const $nameSelect = $('#nameFilter');
            $nameSelect.html('<option value="">全部球員</option>'); 

            const filteredPlayers = team 
                ? allData.filter(d => d.team === team)
                : allData;

            const names = [...new Set(filteredPlayers.map(item => item.name))].sort();
            names.forEach(name => {
                if(name) $nameSelect.append(`<option value="${name}">${name}</option>`);
            });
        }
    });
</script>

</body>
</html>
